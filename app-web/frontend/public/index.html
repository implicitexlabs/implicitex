<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>


  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ImplicitEx - Peer-to-Peer USDC Transfers</title>
    <meta name="description" content="Send USDC peer-to-peer with a transparent 2.5% additive platform fee using ImplicitEx.">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Orbitron:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://implicitex.com">
    <meta property="og:title" content="ImplicitEx - Peer-to-Peer USDC Transfers">
    <meta property="og:description" content="Transfer USDC wallet-to-wallet with ImplicitEx. Transparent 2.5% additive platform fee. Simple. Secure. Powered by Web3.">
    <meta property="og:image" content="https://www.implicitex.com/assets/social-card.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ImplicitEx - Peer-to-Peer USDC Transfers">
    <meta name="twitter:description" content="Wallet-to-wallet USDC transactions with a clear 2.5% additive platform fee. Secure. Fast. Transparent.">
    <meta name="twitter:image" content="https://implicitex.com/assets/social-card.jpg">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://implicitex.com/" />
    <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json" />
    <!-- Apply saved theme before CSS renders to prevent flash of wrong theme -->
    <script>(function(){var t=localStorage.getItem('implicitex-theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}());</script>
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="components/header/header.css" />
    <link rel="stylesheet" href="components/footer/footer.css" />
    <link rel="stylesheet" href="styles/modal.css" />
    <link rel="stylesheet" href="styles/wallet.css" />
    <link rel="stylesheet" href="styles/super.css" />
    <!-- Ethers.js (for wallet interaction) -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>

<body>
  <div class="super-container">
    <!-- Modular Header Placeholder -->
    <div id="header-placeholder"></div>
    <script>
      fetch('components/header/header.html')
  .then(res => {
    if (!res.ok) throw new Error('File not found: ' + res.status);
    return res.text();
  })
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
    var s = document.createElement('script');
    s.src = 'components/header/header.js';
    document.body.appendChild(s);
  })
  .catch(err => {
    document.getElementById('header-placeholder').innerHTML =
      '<div style="color:red;">Failed to load header: ' + err.message + '</div>';
    console.error(err);
  });
    </script>

    <div class="modular-wrap">
      <section class="module mod-a">
        <h2>Platform Status</h2>
        <div class="modal-output-block">
          <label class="modal-label">Mode</label>
          <div class="output-field">Demo only</div>
          <label class="modal-label">Live Transfers</label>
          <div class="output-field">Disabled until testnet signoff</div>
        </div>
      </section>

      <section class="module mod-b">
        <h2>USDC Transfer Preview</h2>
        <div class="modal-output-block">
          <label class="modal-label">Network</label>
          <div class="output-field">Polygon Amoy planned</div>
          <label class="modal-label">Platform Fee</label>
          <div class="output-field">2.5% additive fee</div>
        </div>
        <div class="demo-transfer-cta">
          <button
            type="button"
            class="button btn-send"
            onclick="if (window.openSendModal) { window.openSendModal(); } else { console.warn('openSendModal is not available.'); }"
          >
            Open Demo Transfer
          </button>
          <p class="demo-transfer-note">Demo only — no USDC will be sent from this build.</p>
        </div>
      </section>

      <section class="module mod-c">
        <h2>Wallet Status</h2>
        <div class="modal-output-block">
          <label class="modal-label">Connection</label>
          <div class="output-field">Use Connect Wallet</div>
          <label class="modal-label">USDC Balance</label>
          <div class="output-field">Shown after production wiring</div>
        </div>
      </section>
    </div>
    <div id="footer-placeholder"></div>
    <script>
      fetch('components/footer/footer.html')
  .then(res => {
    if (!res.ok) throw new Error('File not found: ' + res.status);
    return res.text();
  })
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;
    var s = document.createElement('script');
    s.src = 'components/footer/footer.js';
    document.body.appendChild(s);
  })
  .catch(err => {
    document.getElementById('footer-placeholder').innerHTML =
      '<div style="color:red;">Failed to load footer: ' + err.message + '</div>';
    console.error(err);
    });
    </script>
  </div>

  <!-- Modal (if used globally) -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div id="modal-message" class="modal-message"></div>
      <div class="modal-actions">
        <button id="modal-confirm" class="button btn-send">Confirm</button>
        <button id="modal-cancel" class="button">Cancel</button>
      </div>
      <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 1.2em; text-align: center;">
        By continuing, you agree to the 
        <a href="components/terms.html" target="_blank" rel="noopener noreferrer">Terms of Use</a>.
      </p>
    </div>
  </div>

  <!-- Your JS scripts (must come after everything else) -->
  <script src="config/chains.js"></script>
  <script src="scripts/wallet.js"></script>
  <script src="modal/modal.js"></script>
</body>
</html>
