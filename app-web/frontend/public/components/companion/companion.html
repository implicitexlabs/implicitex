<!--
  companion.html — Transaction Companion Tray (fragment)
  Include before </body> in index.html.
  Asset paths when used from the site root:
    <link rel="stylesheet" href="/components/companion/companion.css">
    ...
    <!-- companion tray -->
    <div id="companion" ...>...</div>
    <script src="/components/companion/companion.js"></script>

  State: static shell only. One hardcoded READY state.
  Not wired to wallet flow yet.
-->

<div id="companion" class="companion" role="complementary" aria-label="Transaction status">

  <!-- Detail panel — sits above bar, expands upward -->
  <div class="companion-detail" id="companionDetail" aria-hidden="true">
    <div class="companion-body">

      <div class="companion-row">
        <span class="companion-k">Status</span>
        <span class="companion-v" id="companionStateVal">Ready</span>
      </div>

      <div class="companion-row">
        <span class="companion-k">Funds Moved</span>
        <span class="companion-v" id="companionFundsVal">No active transaction</span>
      </div>

      <div class="companion-row">
        <span class="companion-k">Network</span>
        <span class="companion-v" id="companionNetworkVal">—</span>
      </div>

      <div class="companion-row">
        <span class="companion-k">Last Event</span>
        <span class="companion-v" id="companionEventVal">—</span>
      </div>

      <div class="companion-row companion-row--action" id="companionActionRow">
        <span class="companion-k">Next Step</span>
        <span class="companion-v companion-action" id="companionActionVal">Connect wallet to begin.</span>
      </div>

    </div>
  </div>

  <!-- Bar — always visible at bottom -->
  <div
    class="companion-bar"
    id="companionBar"
    role="button"
    tabindex="0"
    aria-expanded="false"
    aria-controls="companionDetail"
    aria-label="Transaction status — click to expand"
  >
    <span class="companion-indicator" aria-hidden="true"></span>
    <span class="companion-status" id="companionStatus">Ready · No active transaction</span>
    <span class="companion-toggle" aria-hidden="true"></span>
  </div>

</div>
